# nginx proxy address - http://172.17.0.1:59096
#
# =============================================================================
# REQUIRED ENVIRONMENT VARIABLES (create .env file or set in your shell)
# =============================================================================
# Before starting this service, you MUST set these environment variables:
#
# APP_ADMIN_PASS - Strong admin password (generate: openssl rand -base64 32)
# APP_JWT_TOKEN  - JWT secret key (generate: openssl rand -hex 32)
# K256_PRIVATE_KEY - PLC rotation key (generate: openssl ecparam -name secp256k1 -genkey -noout -outform DER | tail -c +8 | head -c 32 | xxd -p -c 32)
#
# Recommended environment variables:
# BASE_DOMAIN_NAME - Your domain (e.g., pds.example.com)
# BASE_HOST_NAME   - Hostname for the server
# PUBLIC_IP        - Your server's public IP address
# EMAIL_SERVER_HOST - SMTP server hostname
# EMAIL_SERVER_PORT - SMTP server port (default: 587)
# APP_ORG_NAME     - Your organization name
#
# Account Management:
# - Create invite codes: docker exec bluesky-server pdsadmin create-invite-code
# - Create admin account: docker exec bluesky-server pdsadmin account create
# - View logs: docker logs bluesky-server
# =============================================================================

name: bluesky
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  server:
    image: ghcr.io/bluesky-social/pds:latest
    container_name: bluesky-server
    domainname: ${BASE_DOMAIN_NAME:-}
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      # =============================================================================
      # SECURITY HARDENED CONFIGURATION
      # =============================================================================
      # This PDS is configured with security best practices to prevent spam/abuse:
      # - Invite-only registration (PDS_INVITE_REQUIRED=1)
      # - Email verification required (PDS_EMAIL_VERIFICATION_REQUIRED=1)
      # - SSRF protection enabled (default)
      # - Strong credentials required (no defaults)
      # - Rate limiting enforced by Bluesky Relay: 10 accounts max, 1,500 events/hr
      # =============================================================================
      - TZ=${TZ:-America/New_York}
      - LOG_ENABLED=1
      - LOG_LEVEL=info
      - PUBLIC_IP=${PUBLIC_IP:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - METADATA_URL=https://ifcfg.us
      - PDS_DATADIR=/pds
      - PDS_DATA_DIRECTORY=/pds
      - PDS_BLOB_UPLOAD_LIMIT=52428800
      - PDS_BLOBSTORE_DISK_LOCATION=/pds/blocks
      - PDS_HOSTNAME=${BASE_DOMAIN_NAME:-$HOSTNAME}
